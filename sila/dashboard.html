<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JAMALI MD | Secure Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0c14;font-family:'Inter',sans-serif;color:#fff;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .glass{background:rgba(12,15,30,0.6);backdrop-filter:blur(12px);border-radius:28px;padding:20px;margin-bottom:20px}
        .stats{display:flex;gap:20px;margin-bottom:20px}
        .stat{background:#0f1222;border-radius:24px;padding:20px;text-align:center;flex:1}
        .stat-value{font-size:2rem;color:#00f6ff;font-weight:700}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #1f2330}
        th{color:#00f6ff}
        button{background:linear-gradient(95deg,#00c6fb,#005bea);border:none;border-radius:40px;padding:8px 16px;color:#fff;cursor:pointer}
        .btn-outline{background:transparent;border:1px solid #00f6ff}
        .footer{text-align:center;margin-top:30px;opacity:0.6}
    </style>
</head>
<body>
<div class="container">
    <div class="glass">
        <h2><i class="fas fa-bolt"></i> JAMALI MD · Secure Dashboard</h2>
        <div class="stats" id="stats"></div>
        <div style="margin: 20px 0; text-align: center">
            <button id="pairBtn" class="btn-outline" style="padding: 10px 20px"><i class="fas fa-link"></i> Pair New Device</button>
            <button id="adminBtn" class="btn-outline" style="margin-left: 10px"><i class="fas fa-shield-alt"></i> Admin Panel</button>
        </div>
    </div>
    <div class="glass">
        <h3>Your Active Bots (Numbers hidden for privacy)</h3>
        <div id="sessions" style="overflow-x:auto; margin-top:15px"></div>
    </div>
    <div class="footer">Powered by JAMALI TECH TZ</div>
</div>
<script>
    // Function to mask phone number: show first 3 and last 3 digits
    function maskNumber(fullNumber) {
        if (!fullNumber || fullNumber.length < 9) return fullNumber;
        let start = fullNumber.substring(0, 3);
        let end = fullNumber.substring(fullNumber.length - 3);
        let masked = start + '*******' + end;
        return masked;
    }

    async function load() {
        try {
            let res = await fetch('/active');
            let data = await res.json();
            let sessions = data.numbers || [];
            document.getElementById('stats').innerHTML = `
                <div class="stat"><div class="stat-value">${sessions.length}</div><div>My Bots</div></div>
                <div class="stat"><div class="stat-value">${sessions.length}</div><div>Active</div></div>
            `;
            let html = `<table><thead><tr><th>Number</th><th>Status</th><th>Uptime</th><th>Action</th></tr></thead><tbody>`;
            for(let num of sessions) {
                let uptime = '--';
                try {
                    let s = await fetch(`/status?number=${num}`);
                    let d = await s.json();
                    uptime = (d.uptime||0)+'s';
                } catch(e) {}
                // Mask the number for normal users
                let maskedNum = maskNumber(num);
                html += `<tr>
                             <td>${maskedNum}</td>
                             <td><span style="color:#0f0">● ONLINE</span></td>
                             <td>${uptime}</td>
                             <td><button class="disconnect-btn" style="background:transparent;border:1px solid #ff4444;color:#ff4444;border-radius:40px;padding:4px 12px;cursor:pointer" onclick="disco('${num}')">Disconnect</button></td>
                         </tr>`;
            }
            if(sessions.length===0) html += `<tr><td colspan="4">No active bots. Use Pair Device.</td></tr>`;
            html += `</tbody></table>`;
            document.getElementById('sessions').innerHTML = html;
        } catch(e) {}
    }
    window.disco = async (num) => {
        if(confirm(`Disconnect bot for ${maskNumber(num)}?`)){
            await fetch(`/disconnect?number=${num}`);
            load();
        }
    };
    document.getElementById('pairBtn').onclick = () => location.href = '/pair';
    document.getElementById('adminBtn').onclick = () => location.href = '/admin-panel';
    load();
    setInterval(load, 10000);
</script>
</body>
</html>
